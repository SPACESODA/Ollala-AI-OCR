<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Launch Ollala AI OCR</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 16px;
      color: color-mix(in srgb, CanvasText 72%, Canvas);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a,
    button {
      border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas);
      border-radius: 8px;
      background: CanvasText;
      color: Canvas;
      cursor: pointer;
      font: inherit;
      padding: 10px 14px;
      text-decoration: none;
    }

    button.secondary {
      background: Canvas;
      color: CanvasText;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    #status {
      min-height: 24px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ollala AI OCR</h1>
    <p id="status">Checking whether the local web app is already running...</p>
    <p>
      If the app is not running, double-click <strong>launch.command</strong>.
      It works even after moving this folder because it starts the app relative
      to its own location.
    </p>
    <div class="actions">
      <a href="http://127.0.0.1:8765">Open Web App</a>
      <button class="secondary" type="button" id="check">Check Again</button>
    </div>
  </main>

  <script>
    const appUrl = "http://127.0.0.1:8765";
    const status = document.querySelector("#status");
    const checkButton = document.querySelector("#check");

    async function checkApp() {
      status.textContent = "Checking whether the local web app is already running...";
      try {
        await fetch(appUrl, { mode: "no-cors", cache: "no-store" });
        status.textContent = "The app is running. Redirecting...";
        window.location.href = appUrl;
      } catch {
        status.textContent = "The app is not running yet.";
      }
    }

    checkButton.addEventListener("click", checkApp);
    checkApp();
  </script>
</body>
</html>
